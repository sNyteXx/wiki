# ---------------------------------
# DO NOT EDIT THIS FILE!
# This is reserved for system use!
# ---------------------------------
name: Wiki.js
defaults:
  config:
    # File defaults
    port: 80
    db:
      type: postgres
      host: localhost
      port: 5432
      user: wikijs
      pass: wikijsrocks
      db: wiki
      ssl: false
      storage: ./db.sqlite
      sslOptions:
        auto: true
    ssl:
      enabled: false
    pool:
      min: 1
    bindIP: 0.0.0.0
    logLevel: info
    logFormat: default
    offline: false
    ha: false
    bodyParserLimit: 5mb
    # DB defaults
    api:
      isEnabled: false
    graphEndpoint: 'https://graph.requarks.io'
    lang:
      code: en
      autoUpdate: true
      namespaces: []
      namespacing: false
      rtl: false
    telemetry:
      clientId: ''
      isEnabled: false
    title: Wiki.js
    company: ''
    contentLicense: ''
    footerOverride: ''
    logoUrl: https://static.requarks.io/logo/wikijs-butterfly.svg
    pageExtensions:
      - md
      - html
      - txt
    mail:
      host: ''
      secure: true
      verifySSL: true
    nav:
      mode: 'MIXED'
    theming:
      theme: 'default'
      iconset: 'md'
      darkMode: false
      tocPosition: 'left'
    auth:
      autoLogin: false
      enforce2FA: false
      hideLocal: false
      loginBgUrl: ''
      audience: 'urn:wiki.js'
      tokenExpiration: '30m'
      tokenRenewal: '14d'
    editShortcuts:
      editFab: true
      editMenuBar: false
      editMenuBtn: true
      editMenuExternalBtn: true
      editMenuExternalName: 'GitHub'
      editMenuExternalIcon: 'mdi-github'
      editMenuExternalUrl: 'https://github.com/org/repo/blob/main/{filename}'
    features:
      featurePageRatings: true
      featurePageComments: true
      featurePersonalWikis: true
    security:
      securityOpenRedirect: true
      securityIframe: true
      securityReferrerPolicy: true
      securityTrustProxy: false
      securitySRI: true
      securityHSTS: false
      securityHSTSDuration: 300
      securityCSP: false
      securityCSPDirectives: ''
    server:
      sslRedir: false
    uploads:
      maxFileSize: 5242880
      maxFiles: 10
      scanSVG: true
      forceDownload: true
    flags:
      ldapdebug: false
      sqllog: false
    # System defaults
    channel: STABLE
    setup: false
    dataPath: ./data
    cors:
      credentials: true
      maxAge: 600
      methods: 'GET,POST'
      origin: true
    search:
      maxHits: 100
    rag:
      enabled: false
      autoBootstrap: false
      # The RAG storage schema is created only by an explicit admin rebuild.
      chatProvider: openai
      embeddingProvider: openai
      maxChunkChars: 1200
      chunkOverlapChars: 150
      maxCandidates: 60
      defaultTopK: 8
      embeddingModel: text-embedding-3-small
      embeddingDimensions: 1536
      chatModel: gpt-4.1-mini
      systemPrompt: ''
      defaultAnswerMode: short
      promptPreset: balanced
      noAnswerThreshold: 0.45
      strictCitationMode: true
      queryAliasesText: ''
      scheduledRebuildHours: 0
      enableSearchButton: false
      openaiBaseUrl: https://api.openai.com/v1
      openaiApiKey: ''
      claudeBaseUrl: https://api.anthropic.com/v1
      claudeApiKey: ''
      claudeModel: claude-3-5-sonnet-latest
      geminiBaseUrl: https://generativelanguage.googleapis.com/v1beta
      geminiApiKey: ''
      geminiChatModel: gemini-1.5-pro
      geminiEmbeddingModel: text-embedding-004
      mistralBaseUrl: https://api.mistral.ai/v1
      mistralApiKey: ''
      mistralChatModel: mistral-large-latest
      mistralEmbeddingModel: mistral-embed
      ollamaBaseUrl: http://localhost:11434
      ollamaChatModel: llama3.1:8b
      ollamaEmbeddingModel: nomic-embed-text
      requestTimeoutMs: 30000
      allowedGroups: []
      allowedPathPrefixes: []
      excludedPathPrefixes: []
    maintainerEmail: security@requarks.io
localeNamespaces:
  - admin
  - auth
  - common
jobs:
  purgeUploads:
    onInit: true
    schedule: PT15M
    offlineSkip: false
    repeat: true
  cleanupClipboardAssets:
    onInit: true
    schedule: P1D
    offlineSkip: false
    repeat: true
  syncGraphLocales:
    onInit: true
    schedule: P1D
    offlineSkip: true
    repeat: true
  syncGraphUpdates:
    onInit: true
    schedule: P1D
    offlineSkip: true
    repeat: true
  rebuildTree:
    onInit: true
    offlineSkip: false
    repeat: false
    immediate: true
    worker: true
groups:
  defaultPermissions:
    - 'read:pages'
    - 'read:assets'
    - 'read:comments'
    - 'write:comments'
  defaultPageRules:
    - id: default
      deny: false
      match: START
      roles:
        - 'read:pages'
        - 'read:assets'
        - 'read:comments'
        - 'write:comments'
      path: ''
      locales: []
reservedPaths:
  - login
  - logout
  - register
  - verify
  - favicons
  - fonts
  - img
  - js
  - svg
# ---------------------------------
