<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><%= title %></title>
  </head>
  <body style="margin:0; padding:24px; background:#f3f4f6; font-family:Arial, sans-serif; color:#111827;">
    <div style="max-width:720px; margin:0 auto; background:#ffffff; border-radius:16px; overflow:hidden; box-shadow:0 10px 30px rgba(15, 23, 42, 0.08);">
      <div style="padding:24px 28px; background:#111827; color:#ffffff;">
        <div style="font-size:12px; letter-spacing:.12em; text-transform:uppercase; opacity:.75;">Wiki.js</div>
        <h1 style="margin:10px 0 0 0; font-size:24px; line-height:1.25;"><%= title %></h1>
      </div>
      <div style="padding:24px 28px;">
        <p style="margin:0 0 18px 0; line-height:1.6; color:#4b5563;"><%= intro %></p>
        <div><%- transcriptHtml %></div>
      </div>
      <div style="padding:18px 28px; border-top:1px solid #e5e7eb; font-size:12px; color:#6b7280;">
        <%= siteTitle %>
      </div>
    </div>
  </body>
</html>
