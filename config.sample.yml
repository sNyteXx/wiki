#######################################################################
# Wiki.js - CONFIGURATION                                             #
#######################################################################
# Full documentation + examples:
# https://docs.requarks.io/install

# ---------------------------------------------------------------------
# Port the server should listen to
# ---------------------------------------------------------------------

port: 3000

# ---------------------------------------------------------------------
# Database
# ---------------------------------------------------------------------
# Supported Database Engines:
# - postgres = PostgreSQL 9.5 or later
# - mysql = MySQL 8.0 or later (5.7.8 partially supported, refer to docs)
# - mariadb = MariaDB 10.2.7 or later
# - mssql = MS SQL Server 2012 or later
# - sqlite = SQLite 3.9 or later

db:
  type: postgres

  # PostgreSQL / MySQL / MariaDB / MS SQL Server only:
  host: localhost
  port: 5432
  user: wikijs
  pass: wikijsrocks
  db: wiki
  ssl: false

  # Optional - PostgreSQL / MySQL / MariaDB only:
  # -> Uncomment lines you need below and set `auto` to false
  # -> Full list of accepted options: https://nodejs.org/api/tls.html#tls_tls_createsecurecontext_options
  sslOptions:
    auto: true
    # rejectUnauthorized: false
    # ca: path/to/ca.crt
    # cert: path/to/cert.crt
    # key: path/to/key.pem
    # pfx: path/to/cert.pfx
    # passphrase: xyz123

  # Optional - PostgreSQL only:
  schema: public

  # SQLite only:
  storage: path/to/database.sqlite

#######################################################################
# ADVANCED OPTIONS                                                    #
#######################################################################
# Do not change unless you know what you are doing!

# ---------------------------------------------------------------------
# SSL/TLS Settings
# ---------------------------------------------------------------------
# Consider using a reverse proxy (e.g. nginx) if you require more
# advanced options than those provided below.

ssl:
  enabled: false
  port: 3443

  # Provider to use, possible values: custom, letsencrypt
  provider: custom

  # ++++++ For custom only ++++++
  # Certificate format, either 'pem' or 'pfx':
  format: pem
  # Using PEM format:
  key: path/to/key.pem
  cert: path/to/cert.pem
  # Using PFX format:
  pfx: path/to/cert.pfx
  # Passphrase when using encrypted PEM / PFX keys (default: null):
  passphrase: null
  # Diffie Hellman parameters, with key length being greater or equal
  # to 1024 bits (default: null):
  dhparam: null

  # ++++++ For letsencrypt only ++++++
  domain: wiki.yourdomain.com
  subscriberEmail: admin@example.com

# ---------------------------------------------------------------------
# Database Pool Options
# ---------------------------------------------------------------------
# Refer to https://github.com/vincit/tarn.js for all possible options

pool:
  # min: 2
  # max: 10

# ---------------------------------------------------------------------
# IP address the server should listen to
# ---------------------------------------------------------------------
# Leave 0.0.0.0 for all interfaces

bindIP: 0.0.0.0

# ---------------------------------------------------------------------
# Log Level
# ---------------------------------------------------------------------
# Possible values: error, warn, info (default), verbose, debug, silly

logLevel: info

# ---------------------------------------------------------------------
# Log Format
# ---------------------------------------------------------------------
# Output format for logging, possible values: default, json

logFormat: default

# ---------------------------------------------------------------------
# Offline Mode
# ---------------------------------------------------------------------
# If your server cannot access the internet. Set to true and manually
# download the offline files for sideloading.

offline: false

# ---------------------------------------------------------------------
# High-Availability
# ---------------------------------------------------------------------
# Set to true if you have multiple concurrent instances running off the
# same DB (e.g. Kubernetes pods / load balanced instances). Leave false
# otherwise. You MUST be using PostgreSQL to use this feature.

ha: false

# ---------------------------------------------------------------------
# Data Path
# ---------------------------------------------------------------------
# Writeable data path used for cache and temporary user uploads.
dataPath: ./data

# ---------------------------------------------------------------------
# Body Parser Limit
# ---------------------------------------------------------------------
# Maximum size of API requests body that can be parsed. Does not affect
# file uploads.

bodyParserLimit: 5mb

# ---------------------------------------------------------------------
# RAG (OpenAI + pgvector)
# ---------------------------------------------------------------------
# Requires PostgreSQL with pgvector extension installed.
# The RAG storage schema is created only by an explicit admin rebuild,
# not by normal application startup or image deployment.

rag:
  enabled: false
  autoBootstrap: false
  # Providers: openai | claude | gemini | mistral | ollama
  chatProvider: openai
  # Providers for embeddings: openai | gemini | mistral | ollama
  embeddingProvider: openai
  maxChunkChars: 1200
  chunkOverlapChars: 150
  maxCandidates: 60
  defaultTopK: 8
  # OpenAI settings
  embeddingModel: text-embedding-3-small
  embeddingDimensions: 1536
  chatModel: gpt-4.1-mini
  # Optional override. Empty uses the built-in safe default prompt.
  systemPrompt: ''
  # Default chat verbosity for the page chatbot: short | standard | detailed
  defaultAnswerMode: short
  # Prompt preset: balanced | concise | bullet | support
  promptPreset: balanced
  # If the best retrieval score stays below this value, the bot answers that
  # the available sources are not strong enough.
  noAnswerThreshold: 0.45
  # When true, the assistant must stay strictly anchored to the sources.
  strictCitationMode: true
  # Optional alias rules, one per line:
  # urlaubsantrag => urlaub, abwesenheit
  queryAliasesText: ''
  # Additional full safety rebuild interval in hours. 0 disables it.
  # New/changed/moved/deleted pages are still indexed immediately.
  scheduledRebuildHours: 0
  enableSearchButton: false
  openaiBaseUrl: https://api.openai.com/v1
  openaiApiKey: ''
  # Claude settings
  claudeBaseUrl: https://api.anthropic.com/v1
  claudeApiKey: ''
  claudeModel: claude-3-5-sonnet-latest
  # Gemini settings
  geminiBaseUrl: https://generativelanguage.googleapis.com/v1beta
  geminiApiKey: ''
  geminiChatModel: gemini-1.5-pro
  geminiEmbeddingModel: text-embedding-004
  # Mistral settings
  mistralBaseUrl: https://api.mistral.ai/v1
  mistralApiKey: ''
  mistralChatModel: mistral-large-latest
  mistralEmbeddingModel: mistral-embed
  # Ollama settings
  ollamaBaseUrl: http://localhost:11434
  ollamaChatModel: llama3.1:8b
  ollamaEmbeddingModel: nomic-embed-text
  requestTimeoutMs: 30000
  # Empty means all users with normal Wiki read permissions can use chatbot.
  # Set explicit group IDs to restrict chatbot visibility.
  allowedGroups: []
  # Optional hard allowlist for indexed and searchable wiki paths.
  # Examples: [docs, handbook/hr]
  allowedPathPrefixes: []
  # Hard exclusions for indexed and searchable wiki paths.
  # Exclusions win over the allowlist.
  # Examples: [confidential, handbook/hr/urlaub]
  excludedPathPrefixes: []
