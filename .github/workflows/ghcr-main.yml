name: Build GHCR Main

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    name: Build and Push
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set GHCR image owner
        run: |
          if [ -n "${{ secrets.GHCR_USERNAME }}" ]; then
            owner="${{ secrets.GHCR_USERNAME }}"
          else
            owner="${{ github.repository_owner }}"
          fi
          echo "IMAGE_OWNER_LC=$(echo ${owner} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME || github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: dev/build/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER_LC }}/wiki:main
            ghcr.io/${{ env.IMAGE_OWNER_LC }}/wiki:sha-${{ github.sha }}
