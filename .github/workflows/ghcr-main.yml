name: Build GHCR Main

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    name: Build and Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image owner
        run: echo "IMAGE_OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: dev/build/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER_LC }}/wiki:main
            ghcr.io/${{ env.IMAGE_OWNER_LC }}/wiki:sha-${{ github.sha }}
